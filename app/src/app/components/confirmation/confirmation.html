<!-- src/app/auth/confirm/confirm.component.html -->
<div class="min-h-screen flex items-center justify-center bg-red-600 px-4">
  <div class="bg-black rounded-xl p-8 w-full max-w-md shadow-xl text-center">
    <h1 class="text-white text-3xl font-extrabold mb-8 uppercase tracking-widest">
      Potwierdzenie maila
    </h1>

    <div [ngClass]="{'text-green-400': isSuccess, 'text-red-400': !isSuccess}" class="text-lg mb-6">
      {{ message }}
    </div>

    <button
      *ngIf="isSuccess"
      routerLink="/login"
      class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition-colors"
    >
      Przejdź do logowania
    </button>
  </div>
</div>
