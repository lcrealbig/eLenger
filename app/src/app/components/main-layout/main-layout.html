<div class="min-h-screen flex flex-col bg-red-600">
  <app-header />

  <main class="flex-1 px-4 sm:px-8 py-10">
    <h1 class="text-white text-4xl font-extrabold mb-8 uppercase tracking-widest text-center drop-shadow">
      Your Activities
    </h1>

    <div class="flex flex-col gap-4 max-w-2xl mx-auto w-full">
      <div
        *ngFor="let event of events"
        class="bg-black text-white rounded-xl shadow-xl hover:scale-105 transition-transform duration-200 p-3 sm:p-6 w-full"
      >
        <div class="hidden sm:block text-red-400 text-xs font-bold uppercase tracking-widest mb-1">
          {{ event.date }}
        </div>

        <h2 class="text-base sm:text-xl font-bold mb-1 overflow-hidden text-ellipsis whitespace-nowrap">
          {{ event.title }}
        </h2>

        <p class="text-gray-400 text-xs sm:text-sm mb-1 sm:mb-3 overflow-hidden text-ellipsis whitespace-nowrap">
           {{ event.location }}
        </p>

        <p class="hidden sm:block text-gray-300 text-sm overflow-hidden text-ellipsis whitespace-nowrap">
          {{ event.description }}
        </p>
      </div>
    </div>
  </main>

  <app-footer />
</div>
