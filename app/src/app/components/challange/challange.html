   <div class="mb-4 flex gap-2">
      <button 
        *ngFor="let filter of filters" 
        (click)="selectedFilter.set(filter)"
        class="px-3 py-1 rounded-lg transition-colors"
        [class.bg-red-600]="selectedFilter() === filter"
        [class.bg-gray-700]="selectedFilter() !== filter">
        {{ filter === 'ALL' ? 'Wszystkie' : filter }}
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
      @for (event of filteredEvents(); track event.id) {
        <div 
          class="bg-black text-white rounded-xl shadow-xl hover:scale-105 transition-transform duration-200 p-3 sm:p-6 w-full cursor-pointer"
          [class.border-2]="event.status === 'ACTIVE'"
          [class.border-red-500]="event.status === 'ACTIVE'"
          (click)="selectEvent.emit(event)">
          
          <div class="flex justify-between items-start">
            <div class="hidden sm:block text-red-400 text-xs font-bold uppercase tracking-widest mb-1">
              {{ event.eventDate }}
            </div>
            @if (event.status) {
              <span class="status-badge" [class]="event.status.toLowerCase()">
                {{ getStatusLabel(event.status) }}
              </span>
            }
          </div>

          <h2 class="text-base sm:text-xl font-bold mb-1 overflow-hidden text-ellipsis whitespace-nowrap">
            {{ event.title }}
          </h2>

          <p class="text-gray-400 text-xs sm:text-sm mb-1 sm:mb-3 overflow-hidden text-ellipsis whitespace-nowrap">
            📍 {{ event.location || 'Brak lokalizacji' }}
          </p>

          <p class="hidden sm:block text-gray-300 text-sm overflow-hidden text-ellipsis whitespace-nowrap">
            {{ event.description || 'Brak opisu' }}
          </p>
        </div>
      } @empty {
        <div class="col-span-full text-center text-gray-500 py-8">
          Brak wydarzeń spełniających kryteria
        </div>
      }
    </div>
