spring:
  config:
    activate:
      on-profile: non-prod

  datasource:
    url: ${NONPROD_DB_URL:jdbc:postgresql://localhost:5433/api_nonprod}
    username: ${NONPROD_DB_USERNAME:postgres}
    password: ${NONPROD_DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    com.api: INFO
    org.springframework.web: INFO

server:
  port: ${NONPROD_SERVER_PORT:8081}