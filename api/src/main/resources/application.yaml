spring:
  datasource:
    url: jdbc:h2:mem:elenger
    driverClassName: org.h2.Driver
    username:
    password:

  h2:
    console:
      enabled: true
      path: /h2

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080